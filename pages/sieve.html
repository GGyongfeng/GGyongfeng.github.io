<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双骰子</title>
  <style>
    :root {
      --bg-start: #f6efe5;
      --bg-end: #d8e3d1;
      --panel: rgba(255, 255, 255, 0.78);
      --text: #1f2933;
      --accent: #c24d2c;
      --accent-deep: #8f3017;
      --shadow: 0 20px 50px rgba(31, 41, 51, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.8), transparent 36%),
        linear-gradient(135deg, var(--bg-start), var(--bg-end));
      color: var(--text);
      font-family: "Avenir Next", "PingFang SC", "Helvetica Neue", sans-serif;
    }

    .game {
      width: min(100%, 680px);
      padding: 40px 28px;
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: 0.06em;
    }

    .subtitle {
      margin: 0 0 28px;
      font-size: 1rem;
      color: rgba(31, 41, 51, 0.72);
    }

    .dice-board {
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 180px));
      justify-content: center;
      gap: 24px;
      margin-bottom: 28px;
    }

    .die {
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 10px;
      padding: 18px;
      border-radius: 24px;
      background: linear-gradient(145deg, #fffdfa, #f3eadf);
      box-shadow:
        inset 0 2px 6px rgba(255, 255, 255, 0.9),
        inset 0 -8px 18px rgba(143, 48, 23, 0.08),
        0 10px 22px rgba(31, 41, 51, 0.12);
    }

    .pip {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: transparent;
      transform: scale(0.2);
      opacity: 0;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    .pip.active {
      background: radial-gradient(circle at 35% 35%, #ffb58f, var(--accent-deep));
      transform: scale(1);
      opacity: 1;
    }

    .controls {
      display: grid;
      gap: 16px;
      justify-items: center;
    }

    button {
      border: 0;
      padding: 14px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(143, 48, 23, 0.26);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(143, 48, 23, 0.28);
    }

    button:active {
      transform: translateY(0);
    }

    .result {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }

    @media (max-width: 520px) {
      .game {
        padding: 28px 20px;
      }

      .dice-board {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="game">
    <h1>双骰子</h1>
    <p class="subtitle">点击按钮，随机掷出两个筛子。</p>

    <section class="dice-board" aria-label="骰子区域">
      <div class="die" data-die="1" aria-label="第一个骰子"></div>
      <div class="die" data-die="2" aria-label="第二个骰子"></div>
    </section>

    <section class="controls">
      <button id="roll-button" type="button">掷骰子</button>
      <p class="result" id="result">结果：1 + 1 = 2</p>
    </section>
  </main>

  <script>
    class Dice {
      static FACE_MAP = {
        1: [4],
        2: [0, 8],
        3: [0, 4, 8],
        4: [0, 2, 6, 8],
        5: [0, 2, 4, 6, 8],
        6: [0, 2, 3, 5, 6, 8]
      };

      constructor(element) {
        this.element = element;
        this.pips = this.createPips();
      }

      createPips() {
        return Array.from({ length: 9 }, () => {
          const pip = document.createElement("span");
          pip.className = "pip";
          this.element.appendChild(pip);
          return pip;
        });
      }

      render(value) {
        const activeIndexes = new Set(Dice.FACE_MAP[value]);

        this.pips.forEach((pip, index) => {
          pip.classList.toggle("active", activeIndexes.has(index));
        });
      }
    }

    class DiceGame {
      constructor() {
        this.result = document.getElementById("result");
        this.rollButton = document.getElementById("roll-button");
        this.dice = Array.from(document.querySelectorAll(".die"), (element) => new Dice(element));
      }

      randomValue() {
        return Math.floor(Math.random() * 6) + 1;
      }

      roll() {
        const values = this.dice.map(() => this.randomValue());
        const total = values[0] + values[1];

        this.dice.forEach((die, index) => die.render(values[index]));
        this.result.textContent = `结果：${values[0]} + ${values[1]} = ${total}`;
      }

      bindEvents() {
        this.rollButton.addEventListener("click", () => this.roll());
      }

      start() {
        this.bindEvents();
        this.roll();
      }
    }

    new DiceGame().start();
  </script>
</body>
</html>
